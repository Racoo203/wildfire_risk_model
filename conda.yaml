name: wildfire
channels:
  - defaults
  - conda-forge
  - pip
dependencies:
  - python=3.13
  - numpy
  - pandas
  - scikit-learn
  - scikit-image
  - matplotlib
  - seaborn
  - scipy
  - xarray
  - streamlit
  - plotly
  - openpyxl
  - h5py
  - pyarrow
  - pip
  - pip:
      - affine
      - cftime
      - cligj
      - geopandas
      - h5netcdf
      - netcdf4
      - pyogrio
      - pyproj
      - rasterio
      - shapely